name: "Setup JFrog CLI OIDC Example"

on:
  push:
    branches: [ "master" ] # Or your specific branch

permissions:
  id-token: write
  contents: read

jobs:
  build-and-scan:
    # Change from ubuntu-latest to self-hosted
    runs-on: self-hosted
    
    env:
      JF_URL: ${{ vars.JF_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          # Ensure this matches your Identity Provider name in JFrog
          oidc-provider-name: BiggieFudge/dvna@github
        env:
          JF_URL: ${{ vars.JF_URL }}

      - name: Build Docker Image
        run: |
          # 1. Prepare variables
          REGISTRY_URL=$(echo "${{ vars.JF_URL }}" | sed -e 's|^https://||' -e 's|/$||')
          IMAGE_NAME="$REGISTRY_URL/docker-local/dvna:${{ github.sha }}"

          # 2. THE FIX: Modify the Dockerfile on the fly to disable SSL checks for npm
          # This inserts 'npm config set strict-ssl false' before the 'npm install' command
          sed -i 's/npm install/npm config set strict-ssl false \&\& npm install/' Dockerfile

          echo "Building: $IMAGE_NAME"

          # 3. Build the image
          docker build --network=host -t "$IMAGE_NAME" .

          # 4. Export image name for the scan step
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: JFrog Docker Scan
        run: |
          # The CLI uses the OIDC token automatically to authenticate the scan
          jf docker scan ${{ env.IMAGE_NAME }}

      - name: Cleanup (Optional)
        if: always()
        run: |
          # Remove the local image to save space on your self-hosted runner
          docker rmi ${{ env.IMAGE_NAME }} || true
